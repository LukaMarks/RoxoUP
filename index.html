<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoxoUP - Produtividade</title>
    <link rel="website icon" type="png" href="https://image.jimcdn.com/app/cms/image/transf/none/path/s56d93db07e4fff92/image/i78cc78006ee61263/version/1777855799/image.png">
    <meta name="msapplication-navbutton-color" content="#5D1789">
<style>
    /* Reset e Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }

    .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }

    .container { 
        background: white; padding: 25px; border-radius: 12px; width: 100%; 
        max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; 
    }

    .input-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
    button { padding: 12px; background: #5D1789; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.98); }

    /* Lista de Tarefas */
    .item-tarefa { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .done { text-decoration: line-through; color: gray; }
    .btn-delete { background: #ff4444; padding: 5px 10px; font-size: 12px; margin-left: auto; }
    
    /* Calculadora */
    .calc { display: flex; flex-direction: column; gap: 10px; }
    #display { width: 100%; height: 50px; font-size: 1.5rem; text-align: right; padding: 10px; background: #eee; border: none; border-radius: 5px; color: #333; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .buttons button { padding: 15px; font-size: 1.2rem; }

    /* Calendário */
    .calendar { background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
    .month-header { 
        background: #5D1789; color: white; padding: 15px; 
        display: flex; justify-content: space-between; align-items: center; 
    }
    .month-header button { background: none; font-size: 20px; padding: 5px 15px; width: auto; }
    .weekdays { background-color: #eee; font-weight: bold; font-size: 12px; display: flex; list-style: none; }
    .weekdays li, .days li { width: 14.28%; text-align: center; padding: 10px 0; }
    .days { list-style: none; display: flex; flex-wrap: wrap; }
    .days li { cursor: pointer; border: 0.5px solid #f9f9f9; font-size: 14px; position: relative; }
    .has-event::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #5D1789; border-radius: 50%; }
    .today { background: #e0b3ff !important; font-weight: bold; color: #5D1789; }

    /* IA */
    .ia-section { background: #f3e5f5; border-left: 5px solid #5D1789; }
    #iaResponse { margin-top: 15px; font-size: 14px; color: #333; line-height: 1.4; white-space: pre-wrap; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 5px; min-height: 20px; display: none; }

    footer { background: #333; color: white; text-align: center; padding: 20px; width: 100%; margin-top: 20px; }
</style>
</head>
<body>
  
    <center>
        <img src="https://image.jimcdn.com/app/cms/image/transf/none/path/s56d93db07e4fff92/image/i78cc78006ee61263/version/1777855799/image.png" style="width: 100px; border-radius: 50%; margin: 10px 0;">
        <h1>RoxoUP</h1>
        <h5>by @Lukamarks</h5>
    </center>

    <div class="content">
        <div class="container ia-section">
            <h2>Assistente IA 🤖✨</h2>
            <h5><span style="color:gray">by Google Gemini</span></h5>
            <div class="input-group">
                <input type="text" id="iaInput" placeholder="Como posso te ajudar hoje?">
                <button onclick="askAI()" id="btnIA">Perguntar à IA</button>
            </div>
            <div id="iaResponse"></div>
        </div>

        <div class="container">
            <h2>Para não esquecer: 📝🧠</h2>
            <h5><span style="color:gray">Compras,Tarefas, Lembretes e etc.</span></h5>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Nova tarefa...">
                <button onclick="addTask()">Adicionar</button>
            </div>
            <div id="taskList"></div>
        </div>

        <div class="container">
            <h2>Calculadora 🔢</h2>
            <div class="calc">
                <input type="text" id="display" disabled>
                <div class="buttons">
                    <button onclick="clearDisplay()" style="background: #ff4444;">C</button>
                    <button onclick="appendToDisplay('/')">/</button>
                    <button onclick="appendToDisplay('*')">*</button>
                    <button onclick="appendToDisplay('+')">+</button>
                    <button onclick="appendToDisplay('1')">1</button>
                    <button onclick="appendToDisplay('2')">2</button>
                    <button onclick="appendToDisplay('3')">3</button>
                    <button onclick="appendToDisplay('-')">-</button>
                    <button onclick="appendToDisplay('4')">4</button>
                    <button onclick="appendToDisplay('5')">5</button>
                    <button onclick="appendToDisplay('6')">6</button>
                    <button onclick="calculate()" style="background: #28a745; grid-row: span 3;">=</button>
                    <button onclick="appendToDisplay('7')">7</button>
                    <button onclick="appendToDisplay('8')">8</button>
                    <button onclick="appendToDisplay('9')">9</button>
                    <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
                    <button onclick="appendToDisplay('.')">.</button>
                </div>
            </div>
        </div>

        <div class="container">
            <h2>Calendário 📅</h2>
            <div class="calendar">
                <div class="month-header">
                    <button onclick="changeMonth(-1)">❮</button>
                    <h3 id="monthDisplay"></h3>
                    <button onclick="changeMonth(1)">❯</button>
                </div>
                <ul class="weekdays">
                    <li>Dom</li><li>Seg</li><li>Ter</li><li>Qua</li><li>Qui</li><li>Sex</li><li>Sáb</li>
                </ul>
                <ul class="days" id="calendarDays"></ul>
            </div>
        </div>

        <marquee><h3><span style="color: #5D1789">RoxoUP V.1.1 - Inteligência Artificial Integrada!</span></h3></marquee>
    </div>

<script>
    // --- CHAVE NOVA ATUALIZADA ---
const API_KEY = "AIzaSyBVfByqlmrFTtcPt37T6AIvuxTqDeVuO4M";


    async function askAI() {
        const input = document.getElementById('iaInput');
        const responseDiv = document.getElementById('iaResponse');
        const btn = document.getElementById('btnIA');

        if (!input.value.trim()) return alert("Escreva algo para a IA!");

        btn.innerText = "Pensando...";
        btn.disabled = true;
        responseDiv.style.display = "block";
        responseDiv.innerText = "Buscando resposta...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Você é o assistente do app RoxoUP. Responda de forma muito curta e direta: ${input.value}` }] }],
                    generationConfig: { maxOutputTokens: 200 } // Limite para evitar gastos excessivos
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            responseDiv.innerText = aiText;
        } catch (e) {
            responseDiv.innerText = "Ocorreu um erro. Tente novamente mais tarde.";
        } finally {
            btn.innerText = "Perguntar à IA";
            btn.disabled = false;
        }
    }

    // --- TAREFAS ---
    function loadTasks() {
        const tasks = JSON.parse(localStorage.getItem('roxo_tasks')) || [];
        document.getElementById('taskList').innerHTML = tasks.map((t, i) => `
            <div class="item-tarefa ${t.done ? 'done' : ''}">
                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
                <span>${t.text}</span>
                <button class="btn-delete" onclick="deleteTask(${i})">X</button>
            </div>
        `).join('');
    }
    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        const tasks = JSON.parse(localStorage.getItem('roxo_tasks')) || [];
        tasks.push({ text: input.value, done: false });
        localStorage.setItem('roxo_tasks', JSON.stringify(tasks));
        input.value = ""; loadTasks();
    }
    function toggleTask(i) {
        const tasks = JSON.parse(localStorage.getItem('roxo_tasks'));
        tasks[i].done = !tasks[i].done;
        localStorage.setItem('roxo_tasks', JSON.stringify(tasks));
        loadTasks();
    }
    function deleteTask(i) {
        const tasks = JSON.parse(localStorage.getItem('roxo_tasks'));
        tasks.splice(i, 1);
        localStorage.setItem('roxo_tasks', JSON.stringify(tasks));
        loadTasks();
    }

    // --- CALCULADORA ---
    const disp = document.getElementById('display');
    function appendToDisplay(v) { disp.value += v; }
    function clearDisplay() { disp.value = ""; }
    function calculate() { try { disp.value = eval(disp.value); } catch { disp.value = "Erro"; } }

    // --- CALENDÁRIO ---
    let date = new Date();
    function renderCalendar() {
        const mDisplay = document.getElementById('monthDisplay');
        const dDisplay = document.getElementById('calendarDays');
        const m = date.getMonth(), y = date.getFullYear();
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        mDisplay.innerText = `${months[m]} ${y}`;
        dDisplay.innerHTML = "";
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        for (let i = 0; i < first; i++) dDisplay.appendChild(document.createElement("li"));
        for (let d = 1; d <= last; d++) {
            const li = document.createElement("li"); li.innerText = d;
            if (d === new Date().getDate() && m === new Date().getMonth()) li.classList.add('today');
            dDisplay.appendChild(li);
        }
    }
    function changeMonth(dir) { date.setMonth(date.getMonth() + dir); renderCalendar(); }

    loadTasks();
    renderCalendar();
</script>
</body>
<footer>
    <p>RoxoUP por Lucas Marques &copy; 2026</p>
</footer>
</html>
